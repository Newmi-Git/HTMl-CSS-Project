<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css\style.css" />
  </head>
  <body>
    <div class="gallery">
      <div class="gallery-heading">
        <h1>GALLERY</h1>
      </div>
      <div class="gallery-images">
        <div class="carousel">
          <input type="radio" name="sl" id="s1" checked />
          <input type="radio" name="sl" id="s2" />
          <input type="radio" name="sl" id="s3" />
            <div class="prev-arrow arrow">
              <label class="prev-3" for="s3">&#8592;</label>
              <label class="prev-1" for="s1">&#8592;</label>
              <label class="prev-2" for="s2">&#8592;</label>
            </div>

            <div class="track-wrap">
              <div class="track">
                <div class="slide">
                  <img src="images\placeholder.webp" alt="" />
                </div>
                <div class="slide">
                  <img src="images\placeholder2.webp" alt="" />
                </div>
                <div class="slide"><img src="photo3.jpg" alt="" /></div>
              </div>
            </div>

            <div class="next-arrow arrow">
              <label class="next-2" for="s2">&#8594;</label>
              <label class="next-3" for="s3">&#8594;</label>
              <label class="next-1" for="s1">&#8594;</label>
            </div>
          <div class="descriptions">
            <div class="desc desc-1">
              <h3>Mountain Sunrise</h3>
              <p>Captured at 5am on a crisp autumn morning.</p>
            </div>
            <div class="desc desc-2">
              <h3>Forest Trail</h3>
              <p>A quiet path through ancient pines.</p>
            </div>
            <div class="desc desc-3">
              <h3>Coastal Cliffs</h3>
              <p>Limestone formations carved by centuries of waves.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="image-description"></div>
  </body>
</html>
